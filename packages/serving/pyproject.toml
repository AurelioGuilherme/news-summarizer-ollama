[project]
name = "serving"
version = "0.1.0"
description = "Ollama serving helpers for summarized model"
requires-python = ">=3.11,<3.13"
dependencies = [
  "pyyaml>=6.0.2",
  "requests>=2.32.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/serving"]
